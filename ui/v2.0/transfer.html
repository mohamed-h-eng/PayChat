    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contact = document.querySelectorAll(".txn-item")
            const contactList = document.querySelector(".contact-list")
            const transferInfo = document.querySelector(".transfer-info")
            const receiver_input = document.querySelector(".receiver-info")
            // const amount = document.querySelector(".amount-value");
            // const buttons = document.querySelectorAll(".keypad button");
            const submit = document.querySelector("#submit")
            // const username = document.querySelector(".auth-username")
            // const pin = document.querySelector(".auth-pin")
            // const usrname_input = document.querySelector(".usrname-input")
            // const usrname_btn = document.querySelector(".usrname-btn")
            const back_btn = document.querySelector("#back-btn")
            // transferInfo.style.display = "none"
            
            //assign callback to contact item
            contact.forEach(contact=>{
                contact.addEventListener("click",()=>{
                    //switch to amount and note screen
                    receiver_input.style.display = "none"
                    contactList.style.display = "none"
                    transferInfo.style.display = "block"
                })
            })

            // Optional: Make inputs readonly so users are forced to use the on-screen keypad
            // inputs.forEach(input => input.setAttribute("readonly", true));
            const amountEl = document.querySelector(".amount-value");
            const floatEl = document.querySelector(".float");
            const buttons = document.querySelectorAll(".keypad button");
            const quick_buttons = document.querySelectorAll(".quick-amount button");
            const eraseBtn = document.querySelector("#erase");

            let amount = "0"; // store as string (like real apps)

            // format function (always show 2 decimal places)
            function formatAmount(val) {
                return Number(val).toLocaleString("en-US", {
                    minimumFractionDigits: 1,
                    maximumFractionDigits: 1
                });
            }

            // update UI
            function updateDisplay() {
                const formatted = formatAmount(amount);
                const [intPart, decimalPart] = formatted.split(".");
                
                amountEl.childNodes[0].nodeValue = intPart;
                floatEl.textContent = "." + decimalPart;
            }

            // handle number input
            buttons.forEach(button => {
                button.addEventListener("click", () => {
                    const value = button.innerText.trim();
                    if (value >= "0" && value <= "9") {
                        if (amount.length > 6) return;
                        amount += value;
                        updateDisplay();
                    }
                });
            });
            quick_buttons.forEach(button => {
                button.addEventListener("click", () => {
                    const value = button.innerText.trim();
                    if (value >= "0" && value <= "9") {
                        if (amount.length > 6) return;
                        amount  = `${(parseInt(amount) + parseInt(value))}`
                        updateDisplay();
                    }
                });
            });

            // handle erase (backspace)
            eraseBtn.addEventListener("click", () => {
                if (amount.length > 1) {
                    amount = amount.slice(0, -1);
                } else {
                    amount = "0";
                }
                updateDisplay();
            });

            // initialize
            updateDisplay();
        })
    </script>
